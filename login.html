<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Systems Lab | Login Gateway</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="login-page" data-page="login.html">
  <main>
    <section class="login-card" aria-labelledby="login-title">
      <h1 id="login-title">Memory Systems Lab</h1>
      <p>Log in to continue into your structured memory workspace.</p>

      <form class="login-form" id="login-form" novalidate>
        <div>
          <label for="login-email">Email</label>
          <input id="login-email" name="email" type="email" autocomplete="email" required />
        </div>
        <div>
          <label for="login-password">Password</label>
          <input id="login-password" name="password" type="password" autocomplete="current-password" required />
        </div>
        <button class="login-button" type="submit">Log In</button>
      </form>

      <a class="continue-link" id="continue-link" href="index.html">Continue without account</a>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
